<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ibandla Youth Success - Loading</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: url('loading-bg.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }
    .loader {
      border: 8px solid rgba(255,255,255,0.3);
      border-top: 8px solid #ffc107;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 2s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .powered {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      color: #ffc107;
    }
  </style>
  <script>
    // Redirect to Home.html after 3 seconds
    setTimeout(function(){
      window.location.href = "home.html";
    }, 3000);
  </script>
</head>
<body>
  <div class="text-center">
    <div class="loader"></div>
    <h2 class="fw-bold">Ibandla Youth Success</h2>
    <p>Loading... Please wait</p>
  </div>
  <div class="powered">Powered by TechInOP</div>
</body>
</html>
